[project]
name = "regknots-ingest"
version = "0.1.0"
description = "eCFR and SOLAS data ingest pipeline"
requires-python = ">=3.12"
dependencies = [
    # HTTP + config
    "httpx>=0.27.0",
    "pydantic>=2.10.0",
    "pydantic-settings>=2.6.0",
    # XML parsing
    "lxml>=5.3.0",
    # Tokenization
    "tiktoken>=0.9.0",
    # Embeddings
    "openai>=1.70.0",
    # Database
    "asyncpg>=0.30.0",
    # CLI progress
    "rich>=13.0.0",
    # PDF parsing (COLREGs, SOLAS, MARPOL, STCW)
    "pdfplumber>=0.11.0",
    # HTML parsing (NVIC index scraper)
    "beautifulsoup4>=4.12.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.25.0",
]
