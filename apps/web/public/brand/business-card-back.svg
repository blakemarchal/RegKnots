<!-- RegKnot business card — back (3.5" x 2" @ 300 DPI = 1050 x 600 px).
     QR is centered; tagline below; flag-state strip along bottom. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 600" width="1050" height="600">
  <!-- Background — Bone -->
  <rect width="1050" height="600" fill="#f0ece4"/>

  <!-- Tagline up top -->
  <g font-family="'Barlow Condensed', 'Oswald', 'Arial Narrow', Impact, sans-serif" fill="#0a0e1a">
    <text x="525" y="80" font-size="32" font-weight="800" text-anchor="middle" letter-spacing="2">SCAN TO START</text>
    <text x="525" y="115" font-size="16" font-weight="500" text-anchor="middle" letter-spacing="6" fill="#5b6478">7-DAY FREE TRIAL · NO CARD</text>
  </g>

  <!-- QR code container (white card on bone bg) -->
  <rect x="375" y="155" width="300" height="300" rx="14" fill="#fff" stroke="#0a0e1a" stroke-width="2"/>
  <!-- QR is referenced from the rendered file; print designer will inline this -->
  <image x="395" y="175" width="260" height="260" href="/brand/qr/regknot.svg"/>

  <!-- Footer: flag strip + URL -->
  <g font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="14" fill="#0a0e1a">
    <text x="525" y="495" text-anchor="middle" font-weight="700">regknot.com</text>
  </g>

  <!-- Flag strip — coverage signal -->
  <g transform="translate(345 520)">
    <text x="0" y="14" font-family="'IBM Plex Mono', monospace" font-size="10" letter-spacing="2" fill="#5b6478">COVERAGE</text>
    <g transform="translate(110 0)">
      <image x="0"   y="0" width="42" height="30" href="/brand/flags/us.svg"/>
      <image x="48"  y="0" width="42" height="30" href="/brand/flags/gb.svg"/>
      <image x="96"  y="0" width="42" height="30" href="/brand/flags/au.svg"/>
      <image x="144" y="0" width="42" height="30" href="/brand/flags/no.svg"/>
      <image x="192" y="0" width="42" height="30" href="/brand/flags/sg.svg"/>
      <image x="240" y="0" width="42" height="30" href="/brand/flags/hk.svg"/>
      <image x="288" y="0" width="42" height="30" href="/brand/flags/bs.svg"/>
      <image x="336" y="0" width="42" height="30" href="/brand/flags/lr.svg"/>
      <image x="384" y="0" width="42" height="30" href="/brand/flags/mh.svg"/>
    </g>
    <text x="588" y="20" font-size="11" font-weight="700" letter-spacing="1.5" fill="#0a0e1a">+ IMO</text>
  </g>
</svg>
